<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-TAP | Authentication</title>
    <style>
        :root { 
            --bg: #F0F4F8; /* Light grayish blue background */
            --card: #FFFFFF; 
            --primary-blue: #1E3A8A; /* Deep institutional blue */
            --accent-red: #E11D48; /* Alert/Action red */
            --text-main: #0F172A; 
            --text-muted: #64748B; 
            --border: #E2E8F0; 
        }
        
        /* ANIMATIONS */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .auth-container { 
            background-color: var(--card); padding: 40px; border-radius: 16px; 
            border: 1px solid var(--border); width: 100%; max-width: 400px; 
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.1); 
            animation: slideUp 0.6s ease-out forwards; /* Applied animation */
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 26px; color: var(--primary-blue); font-weight: 800; letter-spacing: -0.5px; }
        .header p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: var(--text-muted); transition: 0.3s; font-weight: 600; }
        .tab.active { color: var(--primary-blue); border-bottom: 3px solid var(--primary-blue); margin-bottom: -2px; }
        
        .form-group { margin-bottom: 15px; animation: fadeIn 0.4s ease-out; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        .input-field { width: 100%; padding: 12px; background: #F8FAFC; border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.2s; }
        .input-field:focus { outline: none; border-color: var(--primary-blue); background: #FFFFFF; box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }
        
        .btn-primary { width: 100%; background-color: var(--primary-blue); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-top: 10px; box-shadow: 0 4px 6px rgba(30, 58, 138, 0.2); }
        .btn-primary:hover { background-color: #152C69; transform: translateY(-1px); }
        .btn-primary:active { transform: scale(0.98); box-shadow: none; }
        
        .hidden { display: none; }
        select.input-field { appearance: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="header">
            <h1>Z-TAP SYSTEM</h1>
            <p>Secure Biometric Access</p>
        </div>

        <div class="tabs">
            <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
            <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="login-id" class="input-field" placeholder="e.g., M00..." required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pw" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Authenticate Identity</button>
        </form>

        <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" class="input-field" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="reg-id" class="input-field" placeholder="University ID" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="reg-role" class="input-field">
                    <option value="student">Student</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="reg-pw" class="input-field" placeholder="Create a secure password" required>
            </div>
            <button type="submit" class="btn-primary" style="background-color: var(--accent-red);">Register & Scan Face</button>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Verifying...";
            
            const payload = {
                user_id: document.getElementById('login-id').value,
                password: document.getElementById('login-pw').value
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    localStorage.setItem('active_user_id', document.getElementById('login-id').value);
                    if (data.role === 'student') window.location.href = '/student_portal';
                    else if (data.role === 'admin') window.location.href = '/admin_dashboard';
                } else {
                    alert(`Access Denied: ${data.message}`);
                    btn.innerText = originalText;
                }
            } catch (err) {
                alert("Server connection failed.");
                btn.innerText = originalText;
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Provisioning...";

            const payload = {
                full_name: document.getElementById('reg-name').value,
                user_id: document.getElementById('reg-id').value,
                role: document.getElementById('reg-role').value,
                password: document.getElementById('reg-pw').value
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                alert(data.message); 
            } catch (err) {
                alert("Server connection failed.");
            }
            btn.innerText = "Register & Scan Face";
        }
    </script>
</body>
</html>
